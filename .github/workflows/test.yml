name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check
        run: |
          bash -n shaln
          bash -n install.sh
          bash -n tests/run.sh

      - name: Run test suite
        # SHALN_DUCKDB / SHALN_EXTENSION_PATH are unset, so the integration
        # tests skip and the dependency-free unit tests run (parsing, version
        # gate, reads-input/normalization logic, installer platform mapping).
        run: bash tests/run.sh
